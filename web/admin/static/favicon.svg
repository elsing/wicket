<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="#5c6ef5"/>
  <!-- Wicket gate: two posts and a crossbar -->
  <!-- Left post -->
  <rect x="7" y="8" width="3" height="16" rx="1.5" fill="white"/>
  <!-- Right post -->
  <rect x="22" y="8" width="3" height="16" rx="1.5" fill="white"/>
  <!-- Top crossbar -->
  <rect x="7" y="8" width="18" height="3" rx="1.5" fill="white"/>
  <!-- Gate opening / middle bar (lower, suggesting a gate) -->
  <rect x="7" y="17" width="18" height="2.5" rx="1.25" fill="rgba(255,255,255,0.5)"/>
</svg>
